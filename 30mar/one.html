<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=[device-width], initial-scale=1.0">
    <title>One</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing:border-box;
            text-decoration: none;
            border: none;
            background: none;
            font-family: "Roboto", sans-serif;
            font-style: normal;
        }

        header {
            width: 100%;
            height: 72px;
            

            display: flex;
            padding: 0 64px;
            justify-content: space-between;
            align-items: center;
        }

        header > img {
            width: 80px;
            height: 40px;
        }

        .header-nav {
            
            display: flex;
            gap: 32px;
        }

        nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 32px;
        }

        a {
            font-size: 16px;
            font-weight: 400;
            color: black;
            gap: 32px;
        }

        nav > button {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            font-size: 16px;
            
        }

        button > p {
            font-size: 16px;
            font-weight: 100;
            color: black;
        }

        .btn-wrapper {
            display: flex;
            gap: 16px;
        }

        .btn-wrapper > button {
            padding: 8px 20px;
            border-style:solid;
            
            
        }

        .btn-secondary {
            background-color: black;
            color: white;
            
        }
    </style>
</head>
<body>
    <header>
        <img src="./marketing-components/navbars/assets/images/Company Logo.svg" alt="imagem logo company">
        <div class="header-nav">
            <nav>
                <a href="">link One</a>
                <a href="">link Two</a>
                <a href="">link Three</a>
                <button>
                    <p>Link Four</p>
                    <img src="./marketing-components/navbars/assets/images/Vector.svg">
                </button>
            </nav>
            <div class="btn-wrapper">
                <button>button</button>
                <button class="btn-secondary">button</button>
                
            </div>
        </div>
    </header>
</body>
</html>
